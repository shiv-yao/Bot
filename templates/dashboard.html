<!DOCTYPE html>
<html>
<head>
  <title>Trading Dashboard</title>
  <style>
    body { font-family: Arial; background:#0d1117; color:#fff; padding:20px; }
    h1 { color:#58a6ff; }
    .card { background:#161b22; padding:15px; margin:10px 0; border-radius:10px; }
  </style>
</head>
<body>

<h1>🚀 Trading Dashboard</h1>

<div class="card">
  <h3>SOL Balance</h3>
  <div id="sol"></div>
</div>

<div class="card">
  <h3>Positions</h3>
  <pre id="positions"></pre>
</div>

<div class="card">
  <h3>Logs</h3>
  <pre id="logs"></pre>
</div>

<script>
async function load() {
  const res = await fetch('/data');
  const data = await res.json();

  document.getElementById('sol').innerText = data.sol_balance;
  document.getElementById('positions').innerText = JSON.stringify(data.positions, null, 2);
  document.getElementById('logs').innerText = data.logs.slice(-10).join('\n');
}

setInterval(load, 2000);
load();
</script>

</body>
</html>
