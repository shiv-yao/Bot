<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b1020;
      color: #e5e7eb;
      padding: 24px;
    }
    .card {
      max-width: 720px;
      margin: 40px auto;
      background: #121a2f;
      border: 1px solid #1f2a44;
      border-radius: 14px;
      padding: 24px;
    }
    h1 { margin-top: 0; }
    pre {
      background: #0f172a;
      padding: 12px;
      border-radius: 8px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Dashboard OK</h1>
    <p>如果你看到這頁，代表首頁模板已正常。</p>
    <pre id="out">loading...</pre>
  </div>

  <script>
    fetch('/data')
      .then(r => r.json())
      .then(d => {
        document.getElementById('out').textContent = JSON.stringify(d, null, 2);
      })
      .catch(e => {
        document.getElementById('out').textContent = 'fetch /data failed: ' + e;
      });
  </script>
</body>
</html>
