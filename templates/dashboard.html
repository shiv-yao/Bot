<!DOCTYPE html>
<html>
<head>
  <title>Quant Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background:#0d1117; color:#fff; font-family:sans-serif; padding:20px; }
    h1 { color:#58a6ff; }
    .grid { display:grid; grid-template-columns: repeat(2,1fr); gap:20px; }
    .card { background:#161b22; padding:15px; border-radius:10px; }
  </style>
</head>

<body>

<h1>⚔️ Quant Trading Dashboard</h1>

<div class="grid">

  <div class="card">
    <h3>SOL Balance</h3>
    <div id="sol"></div>
  </div>

  <div class="card">
    <h3>Win Rate</h3>
    <div id="winrate"></div>
  </div>

  <div class="card">
    <h3>Equity Curve</h3>
    <canvas id="equityChart"></canvas>
  </div>

  <div class="card">
    <h3>Drawdown</h3>
    <canvas id="ddChart"></canvas>
  </div>

</div>

<div class="card">
  <h3>Positions</h3>
  <pre id="positions"></pre>
</div>

<div class="card">
  <h3>Trade History</h3>
  <pre id="trades"></pre>
</div>

<script>
let equityChart, ddChart;

async function load() {
  const res = await fetch('/data');
  const d = await res.json();

  document.getElementById('sol').innerText = d.sol_balance;
  document.getElementById('positions').innerText = JSON.stringify(d.positions, null, 2);
  document.getElementById('trades').innerText = JSON.stringify(d.trades?.slice(-10), null, 2);

  // ===== 計算勝率 =====
  const trades = d.trades || [];
  const wins = trades.filter(t => t.pnl_pct > 0).length;
  const winrate = trades.length ? (wins / trades.length * 100).toFixed(1) : 0;
  document.getElementById('winrate').innerText = winrate + "%";

  // ===== Equity Curve =====
  let equity = 0;
  let curve = [];
  for (let t of trades) {
    equity += (t.pnl || 0);
    curve.push(equity);
  }

  let dd = [];
  let peak = 0;
  for (let v of curve) {
    peak = Math.max(peak, v);
    dd.push((v - peak));
  }

  renderChart("equityChart", curve, "Equity");
  renderChart("ddChart", dd, "Drawdown");
}

function renderChart(id, data, label) {
  const ctx = document.getElementById(id).getContext("2d");

  if (window[id]) {
    window[id].destroy();
  }

  window[id] = new Chart(ctx, {
    type: 'line',
    data: {
      labels: data.map((_, i) => i),
      datasets: [{
        label: label,
        data: data,
        borderWidth: 2
      }]
    }
  });
}

setInterval(load, 3000);
load();
</script>

</body>
</html>
