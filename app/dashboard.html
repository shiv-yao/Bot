<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-Position Institutional Dashboard</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0b1020; color: #e5e7eb; }
    .wrap { max-width: 1240px; margin: 0 auto; padding: 20px; }
    .title { font-size: 30px; font-weight: 700; margin-bottom: 18px; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 16px; }
    .card { background: #121a2f; border: 1px solid #1f2a44; border-radius: 14px; padding: 16px; overflow:auto; }
    .label { color: #93a3b8; font-size: 13px; margin-bottom: 8px; }
    .value { font-size: 24px; font-weight: 700; }
    .full { grid-column: 1 / -1; }
    .two { grid-column: span 2; }
    .three { grid-column: span 3; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre-wrap; word-break: break-word; }
    ul { margin: 0; padding-left: 18px; }
    li { margin-bottom: 6px; }
    .pill { display: inline-block; padding: 6px 10px; border-radius: 999px; background: #153b2e; color: #8ef0c2; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { border-bottom: 1px solid #22304f; text-align: left; padding: 8px 6px; }
    @media (max-width: 1000px) { .grid { grid-template-columns: 1fr 1fr; } .two, .three { grid-column: span 2; } }
    @media (max-width: 520px) { .grid { grid-template-columns: 1fr; } .two, .three, .full { grid-column: auto; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">⚔️ Multi-Position + 真實成交回寫 + 交易資料庫</div>
    <div class="grid">
      <div class="card"><div class="label">狀態</div><div class="value"><span class="pill" id="running">RUNNING</span></div></div>
      <div class="card"><div class="label">模式</div><div class="value" id="mode">PAPER</div></div>
      <div class="card"><div class="label">真實 SOL 餘額</div><div class="value" id="sol_balance">0</div></div>
      <div class="card"><div class="label">資金</div><div class="value" id="capital">0</div></div>

      <div class="card"><div class="label">訊號數</div><div class="value" id="signals">0</div></div>
      <div class="card"><div class="label">買入數</div><div class="value" id="buys">0</div></div>
      <div class="card"><div class="label">賣出數</div><div class="value" id="sells">0</div></div>
      <div class="card"><div class="label">錯誤數</div><div class="value" id="errors">0</div></div>

      <div class="card full"><div class="label">最新訊號</div><div class="mono" id="last_signal">-</div></div>
      <div class="card full"><div class="label">最後交易</div><div class="mono" id="last_trade">-</div></div>

      <div class="card two"><div class="label">多倉位（真實持倉同步）</div><div id="positions">無持倉</div></div>
      <div class="card two"><div class="label">Logs</div><ul id="logs"></ul></div>

      <div class="card full">
        <div class="label">交易歷史資料庫（最新 50 筆）</div>
        <div id="history"></div>
      </div>
    </div>
  </div>
<script>
async function refreshData() {
  const res = await fetch('/data');
  const d = await res.json();
  document.getElementById('running').textContent = d.running ? 'RUNNING' : 'STOPPED';
  document.getElementById('mode').textContent = d.mode || 'PAPER';
  document.getElementById('sol_balance').textContent = Number(d.sol_balance || 0).toFixed(6);
  document.getElementById('capital').textContent = Number(d.capital || 0).toFixed(6);
  document.getElementById('last_trade').textContent = d.last_trade || '-';
  document.getElementById('last_signal').textContent = d.last_signal || '-';
  document.getElementById('signals').textContent = d.stats?.signals ?? 0;
  document.getElementById('buys').textContent = d.stats?.buys ?? 0;
  document.getElementById('sells').textContent = d.stats?.sells ?? 0;
  document.getElementById('errors').textContent = d.stats?.errors ?? 0;

  const pos = document.getElementById('positions');
  if (!d.positions || d.positions.length === 0) {
    pos.textContent = '無持倉';
  } else {
    pos.innerHTML = '<ul>' + d.positions.map(
      p => `<li>${p.token} | amount=${p.amount ?? 0} | entry=${p.entry_price ?? 0} | pnl=${p.pnl ?? 0} | score=${p.score ?? 0} | scaled_out=${p.scaled_out ? 'Y' : 'N'}</li>`
    ).join('') + '</ul>';
  }

  const logs = document.getElementById('logs');
  logs.innerHTML = '';
  (d.logs || []).slice().reverse().forEach(line => {
    const li = document.createElement('li');
    li.textContent = line;
    logs.appendChild(li);
  });

  const hist = document.getElementById('history');
  const rows = d.trade_history || [];
  if (rows.length === 0) {
    hist.textContent = '暫無資料';
  } else {
    hist.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>時間</th><th>Side</th><th>Mint</th><th>Amount SOL</th><th>Entry</th><th>Exit</th><th>PnL%</th><th>Reason</th><th>Status</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td>${r.ts ?? ''}</td>
              <td>${r.side ?? ''}</td>
              <td>${(r.mint ?? '').slice(0,8)}</td>
              <td>${r.amount_sol ?? ''}</td>
              <td>${r.entry_price ?? ''}</td>
              <td>${r.exit_price ?? ''}</td>
              <td>${r.pnl_pct ?? ''}</td>
              <td>${r.reason ?? ''}</td>
              <td>${r.status ?? ''}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }
}
refreshData();
setInterval(refreshData, 2000);
</script>
</body>
</html>
